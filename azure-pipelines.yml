name: Katalon API Regression

trigger:
  - master

pool:
  vmImage: ubuntu-latest

variables:
  KATALON_VERSION: '10.2.4'

steps:
  - checkout: self
    displayName: Checkout repository

  - bash: |
      curl -o katalon.tar.gz "https://download.katalon.com/${KATALON_VERSION}/Katalon_Studio_Engine_Linux_64-${KATALON_VERSION}.tar.gz"
      tar -xvf katalon.tar.gz
    displayName: Download Katalon Runtime Engine

  - bash: |
      ./Katalon_Studio_Engine_Linux_64-${KATALON_VERSION}/katalonc \
        -apiKey="$(KATALON_API_KEY)" \
        -projectPath="$(System.DefaultWorkingDirectory)/web-service-tests.prj" \
        -testSuitePath="Test Suites/TS-Regression_Full" \
        -browserType="Chrome"
    displayName: Run API Test Suite
